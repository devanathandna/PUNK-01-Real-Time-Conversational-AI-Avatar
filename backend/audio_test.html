<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar TTS Audio & Animation Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .avatar-container {
            text-align: center;
            margin: 30px 0;
        }

        .avatar {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .avatar.talking {
            animation: talking 0.4s infinite;
        }

        @keyframes talking {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .avatar.emotion-Talking {
            filter: brightness(1);
        }

        .avatar.emotion-Acknowledging {
            animation: nodding 0.6s infinite;
        }

        @keyframes nodding {
            0%, 100% {
                transform: rotateX(0deg);
            }
            50% {
                transform: rotateX(-5deg);
            }
        }

        .avatar.emotion-Talking2 {
            animation: talking2 0.5s infinite;
        }

        @keyframes talking2 {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .status-display {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            font-weight: 600;
            color: #333;
        }

        .status-value {
            color: #667eea;
        }

        .test-controls {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .test-controls h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .control-group input,
        .control-group textarea,
        .control-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .control-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-test {
            background: #667eea;
            color: white;
        }

        .btn-test:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-stop {
            background: #e74c3c;
            color: white;
        }

        .btn-stop:hover {
            background: #c0392b;
        }

        .btn-clear {
            background: #95a5a6;
            color: white;
        }

        .btn-clear:hover {
            background: #7f8c8d;
        }

        .response-display {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .response-display h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .response-text {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
        }

        .logs {
            background: #1e1e1e;
            color: #00ff00;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 5px;
            word-break: break-word;
        }

        .log-info {
            color: #87ceeb;
        }

        .log-success {
            color: #00ff00;
        }

        .log-error {
            color: #ff6b6b;
        }

        .log-warning {
            color: #ffa500;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .avatar {
                width: 120px;
                height: 120px;
                font-size: 50px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Avatar TTS Audio & Animation Test</h1>
            <p>Test Edge TTS audio playback with avatar animation</p>
        </div>

        <div class="content">
            <!-- Avatar Display -->
            <div class="avatar-container">
                <div id="avatar" class="avatar">🤖</div>
                <div style="color: #666; font-size: 14px;">
                    Status: <span id="animation-status">Idle</span>
                </div>
            </div>

            <!-- Status Display -->
            <div class="status-display">
                <div class="status-item">
                    <span class="status-label">Audio Playing:</span>
                    <span class="status-value" id="status-playing">No</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Audio Duration:</span>
                    <span class="status-value" id="status-duration">0.0s</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Audio Format:</span>
                    <span class="status-value" id="status-format">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Emotion:</span>
                    <span class="status-value" id="status-emotion">None</span>
                </div>
            </div>

            <!-- Test Controls -->
            <div class="test-controls">
                <h3>Test Configuration</h3>

                <div class="control-group">
                    <label>Response Text</label>
                    <textarea id="test-text" placeholder="Enter text to synthesize...">Hostel fees structure ah nalla clear pannachu. Annual fee 30,000 rupees, monthly uh 2,500 per month.</textarea>
                </div>

                <div class="control-group">
                    <label>Language</label>
                    <select id="test-language">
                        <option value="ta">Tamil (ta)</option>
                        <option value="en">English (en)</option>
                        <option value="hi">Hindi (hi)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Emotion</label>
                    <select id="test-emotion">
                        <option value="none">None</option>
                        <option value="happy">Happy</option>
                        <option value="sad">Sad</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-test" onclick="testAudioPlayback()">🎵 Play Audio Test</button>
                    <button class="btn-stop" onclick="stopAudio()">⏹️ Stop</button>
                    <button class="btn-clear" onclick="clearLogs()">🗑️ Clear Logs</button>
                </div>
            </div>

            <!-- Response Display -->
            <div class="response-display">
                <h3>Response Text</h3>
                <div class="response-text" id="response-text">
                    Response text will appear here...
                </div>
            </div>

            <!-- Debug Logs -->
            <div class="logs" id="logs">
                <div class="log-entry log-info">Ready for testing. Click "Play Audio Test" to begin.</div>
            </div>
        </div>
    </div>

    <div id="audio-container" style="display: none;"></div>

    <script>
        class AvatarTTSHandler {
            constructor() {
                this.avatar = document.getElementById('avatar');
                this.currentAudio = null;
                this.isPlaying = false;
                this.animationTimeout = null;
            }

            log(message, type = 'info') {
                const logsDiv = document.getElementById('logs');
                const entry = document.createElement('div');
                entry.className = `log-entry log-${type}`;
                const timestamp = new Date().toLocaleTimeString();
                entry.textContent = `[${timestamp}] ${message}`;
                logsDiv.appendChild(entry);
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }

            decodeAudio(base64Data) {
                try {
                    const binaryString = atob(base64Data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    return bytes;
                } catch (error) {
                    this.log(`Decoding error: ${error.message}`, 'error');
                    throw error;
                }
            }

            setupAudioElement(audioData) {
                try {
                    const audioBlob = new Blob([audioData], { type: 'audio/mpeg' });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    const audioElement = new Audio();
                    audioElement.src = audioUrl;

                    audioElement.onended = () => this.handleAudioEnd();
                    audioElement.onerror = (e) => this.handleAudioError(e);

                    return audioElement;
                } catch (error) {
                    this.log(`Audio setup error: ${error.message}`, 'error');
                    throw error;
                }
            }

            startAnimation(emotion) {
                this.avatar.classList.add('talking', `emotion-${emotion}`);
                document.getElementById('animation-status').textContent = `Talking (${emotion})`;
                this.log(`Animation started: ${emotion}`, 'success');
            }

            stopAnimation() {
                this.avatar.classList.remove('talking');
                this.avatar.className = this.avatar.className.replace(/emotion-\w+/, '');
                document.getElementById('animation-status').textContent = 'Idle';
                this.isPlaying = false;
                if (this.animationTimeout) {
                    clearTimeout(this.animationTimeout);
                }
                this.log('Animation stopped', 'info');
            }

            updateStatus(response) {
                document.getElementById('status-playing').textContent = this.isPlaying ? 'Yes' : 'No';
                document.getElementById('status-duration').textContent = 
                    response.audio_duration ? response.audio_duration.toFixed(1) + 's' : '0.0s';
                document.getElementById('status-format').textContent = response.audio_format || 'mp3';
                document.getElementById('status-emotion').textContent = response.emotion || 'None';
            }

            async playAudio(response) {
                if (!response.audio_data) {
                    this.log('No audio data in response', 'error');
                    return false;
                }

                try {
                    // Kill previous audio
                    if (this.currentAudio) {
                        this.currentAudio.pause();
                        this.currentAudio = null;
                    }

                    // Decode audio data
                    const audioData = this.decodeAudio(response.audio_data);
                    this.log(`Decoded audio: ${audioData.length} bytes`, 'success');

                    // Setup audio element
                    const audioElement = this.setupAudioElement(audioData);
                    this.currentAudio = audioElement;
                    this.isPlaying = true;

                    // Update status
                    this.updateStatus(response);

                    // Start animation
                    const emotion = response.emotion || 'Talking';
                    this.startAnimation(emotion);

                    // Play audio
                    const playPromise = audioElement.play();
                    if (playPromise !== undefined) {
                        await playPromise;
                    }

                    this.log(`Audio playback started (${response.audio_duration.toFixed(1)}s)`, 'success');

                    // Setup timeout for safety
                    const duration = response.audio_duration || 5;
                    this.animationTimeout = setTimeout(
                        () => this.stopAnimation(),
                        (duration + 0.5) * 1000
                    );

                    return true;
                } catch (error) {
                    this.log(`Playback error: ${error.message}`, 'error');
                    this.stopAnimation();
                    return false;
                }
            }

            handleAudioEnd() {
                this.log('Audio playback ended', 'success');
                this.stopAnimation();
            }

            handleAudioError(error) {
                this.log(`Audio error: ${error.type || 'Unknown'}`, 'error');
                this.stopAnimation();
            }
        }

        // Initialize handler
        const ttHandler = new AvatarTTSHandler();

        // Test function
        async function testAudioPlayback() {
            const text = document.getElementById('test-text').value;
            const language = document.getElementById('test-language').value;
            const emotion = document.getElementById('test-emotion').value;

            if (!text.trim()) {
                ttHandler.log('Please enter text to synthesize', 'warning');
                return;
            }

            ttHandler.log(`Creating mock response: lang=${language}, emotion=${emotion}`, 'info');

            // Create mock response for testing
            const mockResponse = {
                type: 'text_with_audio_response',
                response: text,
                audio_data: await generateMockMP3(text),
                audio_format: 'mp3',
                audio_duration: estimateDuration(text),
                tts_enabled: true,
                tts_status: 'ready',
                animation_trigger: 'start',
                emotion: emotion || 'Talking',
                voice: language === 'ta' ? 'ta-IN-PallaviNeural' : 'en-US-AriaNeural'
            };

            // Update response display
            document.getElementById('response-text').textContent = text;

            // Start playback
            await ttHandler.playAudio(mockResponse);
        }

        function stopAudio() {
            ttHandler.stopAnimation();
            if (ttHandler.currentAudio) {
                ttHandler.currentAudio.pause();
                ttHandler.currentAudio.currentTime = 0;
            }
            ttHandler.log('Audio stopped manually', 'warning');
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '<div class="log-entry log-info">Logs cleared</div>';
        }

        function estimateDuration(text) {
            const words = text.split(/\s+/).length;
            return Math.max(0.5, words * 0.4);
        }

        // Mock MP3 generator (for testing without real TTS)
        async function generateMockMP3(text) {
            // Generate a simple 440Hz tone of estimated duration
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const duration = estimateDuration(text);
            const buffer = context.createAudioBuffer(1, context.sampleRate * duration, context.sampleRate);
            const channelData = buffer.getChannelData(0);

            for (let i = 0; i < buffer.length; i++) {
                channelData[i] = Math.sin(2 * Math.PI * 440 * i / context.sampleRate) * 0.1;
            }

            // Note: This is a placeholder. In real scenario, use Edge TTS API
            ttHandler.log(`Mock MP3 generated (${duration.toFixed(1)}s duration)`, 'info');
            
            // Return a simple WAV instead (browsers handle this better)
            return encodeWAV(buffer, context.sampleRate);
        }

        function encodeWAV(audioBuffer, sampleRate) {
            const left = audioBuffer.getChannelData(0);
            const length = left.length * 2 + 44;
            const payload = new ArrayBuffer(length);
            const view = new DataView(payload);
            const offset = 0;
            const pos = 0;

            // WAV header
            const setUint16 = (pos, value) => {
                view.setUint16(pos, value, true);
                return pos + 2;
            };
            const setUint32 = (pos, value) => {
                view.setUint32(pos, value, true);
                return pos + 4;
            };

            let p = 0;
            p = setUint32(p, 0x46464952); // "RIFF"
            p = setUint32(p, 36 + left.length * 2); // file length
            p = setUint32(p, 0x45564157); // "WAVE"
            p = setUint32(p, 0x20746d66); // "fmt "
            p = setUint32(p, 16); // chunk size
            p = setUint16(p, 1); // PCM
            p = setUint16(p, 1); // channels
            p = setUint32(p, sampleRate);
            p = setUint32(p, sampleRate * 2);
            p = setUint16(p, 2); // block alignment
            p = setUint16(p, 16); // bit depth
            p = setUint32(p, 0x61746164); // "data"
            p = setUint32(p, left.length * 2);

            let index = 0;
            const volume = 0.8;
            while (p < length) {
                let sample = Math.max(-1, Math.min(1, left[index++]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(p, sample, true);
                p += 2;
            }

            return btoa(String.fromCharCode.apply(null, new Uint8Array(payload)));
        }

        // Log initialization
        ttHandler.log('TTS Handler initialized', 'success');
    </script>
</body>
</html>
